name: CI

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-checks:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyright

      - name: Run Pyright
        run: |
          pyright google/antigravity

      - name: Run examples
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd examples/getting_started
          for f in *.py; do
            if [ "$f" = "human_in_the_loop.py" ]; then
              echo "Skipping interactive script: $f"
              continue
            fi
            echo "Running $f"
            python "$f" || exit 1
          done
